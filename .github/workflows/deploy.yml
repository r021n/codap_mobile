name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    # Menghubungkan job ini dengan environment agar bisa mengakses secrets
    environment: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build
        # Vite membutuhkan variabel ini saat build untuk di-inject ke client-side code
        run: npm run build
        env:
          VITE_AI_WORKER_URL: ${{ secrets.VITE_AI_WORKER_URL }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Pastikan folder output Vite Anda adalah 'dist'
          path: "./dist"

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
